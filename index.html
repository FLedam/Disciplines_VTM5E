<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Éveil du Sang — V:tM V5</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: #0a0000;
    color: #d9c9b5;
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    background: radial-gradient(ellipse at center, #1a0505 0%, #0a0000 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }
  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 24px 20px 40px;
    min-height: 100vh;
    width: 100%;
    animation: fadeIn 0.6s ease-in;
  }
  .screen.active { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  h1 {
    font-family: 'Georgia', serif;
    font-size: 1.9rem;
    color: #a01818;
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 8px;
    text-shadow: 0 0 12px rgba(160,24,24,0.4);
    font-weight: normal;
  }
  h2 {
    font-size: 1.3rem;
    color: #c0a878;
    text-align: center;
    margin: 16px 0 20px;
    letter-spacing: 2px;
    font-weight: normal;
    font-style: italic;
  }
  .subtitle {
    text-align: center;
    color: #8a7358;
    font-style: italic;
    margin-bottom: 30px;
    font-size: 0.95rem;
    max-width: 480px;
  }

  /* CLAN SELECTION */
  .clan-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 500px;
    margin-top: 10px;
  }
  .clan-btn {
    background: linear-gradient(180deg, #1a0808 0%, #0f0303 100%);
    border: 1px solid #3a1010;
    color: #d9c9b5;
    padding: 18px 12px;
    font-family: inherit;
    font-size: 1.05rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .clan-btn:hover, .clan-btn:active {
    background: linear-gradient(180deg, #3a0808 0%, #1a0303 100%);
    border-color: #a01818;
    color: #f0d8b8;
    box-shadow: 0 0 15px rgba(160,24,24,0.4);
  }

  /* RITUAL SCREEN */
  .ritual-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    width: 100%;
    position: relative;
    z-index: 2;
  }
  .clan-badge {
    color: #a01818;
    font-size: 0.85rem;
    letter-spacing: 4px;
    margin-bottom: 30px;
    text-transform: uppercase;
    position: relative;
    z-index: 2;
  }
  .pulse-zone {
    width: 240px;
    height: 240px;
    border-radius: 50%;
    background: radial-gradient(circle, #2a0505 0%, #100202 70%, transparent 100%);
    border: 2px solid #3a1010;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    touch-action: none;
    cursor: pointer;
    transition: border-color 0.3s;
    z-index: 3;
  }
  .pulse-zone.active {
    border-color: #a01818;
  }
  .pulse-zone.active::before,
  .pulse-zone.active::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid #a01818;
    animation: heartbeat 1s ease-out infinite;
  }
  .pulse-zone.active::after {
    animation-delay: 0.4s;
  }
  @keyframes heartbeat {
    0% { transform: scale(1); opacity: 0.9; box-shadow: 0 0 20px rgba(160,24,24,0.5); }
    50% { transform: scale(1.15); opacity: 0.6; box-shadow: 0 0 40px rgba(160,24,24,0.7); }
    100% { transform: scale(1.35); opacity: 0; box-shadow: 0 0 60px rgba(160,24,24,0); }
  }
  .pulse-inner {
    color: #c0a878;
    text-align: center;
    padding: 20px;
    font-size: 0.9rem;
    letter-spacing: 1px;
    z-index: 2;
    pointer-events: none;
  }
  .pulse-zone.active .pulse-inner {
    color: #f0d8b8;
    animation: innerPulse 1s ease-in-out infinite;
  }
  @keyframes innerPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .instruction {
    color: #8a7358;
    text-align: center;
    margin-top: 40px;
    font-style: italic;
    font-size: 0.95rem;
    max-width: 320px;
    line-height: 1.5;
    position: relative;
    z-index: 2;
  }
  .progress-text {
    color: #a01818;
    font-size: 1.1rem;
    letter-spacing: 3px;
    margin-top: 20px;
    min-height: 24px;
    position: relative;
    z-index: 2;
  }
  .back-btn {
    margin-top: 30px;
    background: transparent;
    border: 1px solid #3a1010;
    color: #8a7358;
    padding: 10px 20px;
    font-family: inherit;
    font-size: 0.85rem;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    position: relative;
    z-index: 2;
  }
  .back-btn:hover { color: #d9c9b5; border-color: #a01818; }

  /* ===== BLOOD OVERLAY EFFECT ===== */
  .blood-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .blood-overlay.active { opacity: 1; }

  .blood-splat {
    position: absolute;
    transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) scale(0);
    transform-origin: center;
    animation: splatGrow 1.6s cubic-bezier(0.2, 0.7, 0.3, 1) forwards;
    filter: drop-shadow(0 0 4px rgba(80, 0, 0, 0.6));
    pointer-events: none;
  }
  .blood-splat svg {
    display: block;
    overflow: visible;
  }
  @keyframes splatGrow {
    0% {
      transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) scale(0);
      opacity: 0;
    }
    15% {
      opacity: 1;
    }
    60% {
      transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) scale(1.05);
    }
    100% {
      transform: translate(-50%, -50%) rotate(var(--rot, 0deg)) scale(1);
      opacity: 1;
    }
  }
  .blood-splat .droplet {
    animation: dropletAppear 0.4s ease-out backwards;
  }
  @keyframes dropletAppear {
    from { opacity: 0; transform: scale(0.3); }
    to { opacity: 1; transform: scale(1); }
  }

  /* Final red flood */
  .blood-flood {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center,
        #a01818 0%,
        #7a0000 40%,
        #4a0000 70%,
        #2a0000 100%);
    opacity: 0;
    pointer-events: none;
    z-index: 1000;
    transition: opacity 1.2s ease-in;
  }
  .blood-flood.active { opacity: 1; }

  /* Fade transition to result */
  .transition-veil {
    position: fixed;
    inset: 0;
    background: #0a0000;
    opacity: 0;
    pointer-events: none;
    z-index: 1001;
    transition: opacity 0.8s ease-in-out;
  }
  .transition-veil.active { opacity: 1; }

  /* RESULT SCREEN */
  .power-card {
    background: linear-gradient(180deg, #1a0505 0%, #0a0101 100%);
    border: 1px solid #3a1010;
    padding: 24px 20px;
    width: 100%;
    max-width: 520px;
    margin: 20px 0;
    border-radius: 3px;
    box-shadow: 0 0 30px rgba(160,24,24,0.2);
    animation: revealCard 1.2s ease-out;
  }
  @keyframes revealCard {
    from { opacity: 0; transform: translateY(20px); filter: blur(4px); }
    to { opacity: 1; transform: translateY(0); filter: blur(0); }
  }
  .discipline-label {
    color: #a01818;
    font-size: 0.8rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
  }
  .power-name {
    color: #f0d8b8;
    font-size: 1.6rem;
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 4px;
    font-style: italic;
  }
  .power-level {
    color: #8a7358;
    text-align: center;
    font-size: 0.85rem;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .separator {
    height: 1px;
    background: linear-gradient(90deg, transparent, #3a1010, transparent);
    margin: 16px 0;
  }
  .power-desc {
    color: #d9c9b5;
    line-height: 1.6;
    font-size: 0.95rem;
    margin-bottom: 16px;
    text-align: justify;
  }
  .power-detail {
    margin: 10px 0;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .power-detail strong {
    color: #c0a878;
    letter-spacing: 1px;
  }
  .actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 520px;
    margin-top: 20px;
  }
  .action-btn {
    background: linear-gradient(180deg, #2a0808 0%, #150303 100%);
    border: 1px solid #a01818;
    color: #d9c9b5;
    padding: 14px;
    font-family: inherit;
    font-size: 0.95rem;
    letter-spacing: 2px;
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    transition: all 0.3s;
  }
  .action-btn:hover, .action-btn:active {
    background: linear-gradient(180deg, #4a0808 0%, #2a0303 100%);
    box-shadow: 0 0 15px rgba(160,24,24,0.5);
  }
  .action-btn.secondary {
    background: transparent;
    border-color: #3a1010;
    color: #8a7358;
  }
  .exhausted-msg {
    color: #a01818;
    text-align: center;
    font-style: italic;
    margin-top: 20px;
    padding: 20px;
    border: 1px solid #3a1010;
    max-width: 520px;
    width: 100%;
  }
  .ornament {
    text-align: center;
    color: #3a1010;
    font-size: 1.5rem;
    margin: 20px 0 10px;
    letter-spacing: 8px;
  }
</style>
</head>
<body>

<!-- SCREEN 1: CLAN SELECTION -->
<div class="screen active" id="screen-clans">
  <div class="ornament">❦</div>
  <h1>ÉVEIL DU SANG</h1>
  <div class="ornament">❦</div>
  <p class="subtitle">Découvrez le pouvoir qui sommeille dans vos veines.<br>Choisissez d'abord votre clan.</p>
  <div class="clan-grid" id="clan-grid"></div>
</div>

<!-- SCREEN 2: RITUAL -->
<div class="screen" id="screen-ritual">
  <div class="clan-badge" id="clan-badge"></div>
  <h2>Le Rituel</h2>
  <div class="ritual-container">
    <div class="pulse-zone" id="pulse-zone">
      <div class="pulse-inner" id="pulse-inner">
        Posez votre<br>doigt ici
      </div>
    </div>
    <div class="progress-text" id="progress-text"></div>
    <p class="instruction">Maintenez votre doigt sur le cercle pendant 5 secondes.<br>Écoutez le battement de votre Bête.</p>
    <button class="back-btn" onclick="goToClanSelection()">← Changer de clan</button>
  </div>
</div>

<!-- SCREEN 3: RESULT -->
<div class="screen" id="screen-result">
  <div class="ornament">❦</div>
  <div class="clan-badge" id="clan-badge-result"></div>
  <div class="power-card" id="power-card"></div>
  <div class="actions">
    <button class="action-btn" id="reroll-btn" onclick="rerollPower()">Je possède déjà ce pouvoir</button>
    <button class="action-btn secondary" onclick="restartRitual()">Recommencer le rituel</button>
    <button class="action-btn secondary" onclick="goToClanSelection()">Changer de clan</button>
  </div>
  <div id="exhausted-container"></div>
</div>

<!-- BLOOD EFFECT LAYERS -->
<div class="blood-overlay" id="blood-overlay"></div>
<div class="blood-flood" id="blood-flood"></div>
<div class="transition-veil" id="transition-veil"></div>

<script>
// =====================================================
// DATA — Clans, Disciplines & Pouvoirs de niveau 1
// Basé sur Vampire: la Mascarade 5e édition
// =====================================================

const DISCIPLINES = {
  "Animalisme": {
    surnoms: "faire sa princesse Disney, dressage, Bestiae sermo",
    resonance: "Sang animal",
    type: "Mentale",
    powers: [
      {
        name: "Lier le Famulus",
        desc: "Quand il crée un lien de sang avec un animal, le vampire peut le transformer en famulus. Il établit une connexion mentale avec la créature qui facilite l'utilisation d'autres pouvoirs d'Animalisme. La liaison ne permet pas de dialoguer, mais le vampire peut donner des ordres simples comme « ne bouge pas » ou « viens ici ». L'animal attaque pour défendre sa propre vie et celle de son maître.",
        cout: "L'animal doit se nourrir du sang du personnage au cours de trois nuits distinctes (test d'Exaltation à chaque fois). Ensuite, une quantité négligeable de sang suffit à maintenir son état de goule.",
        systeme: "Donner un ordre à l'animal requiert un jet de Charisme + Animaux (difficulté 2). La difficulté augmente pour les instructions complexes. Un vampire ne peut avoir qu'un seul famulus à la fois.",
        duree: "Seule la mort libère le famulus. Tant qu'il reçoit du sang de vampire régulièrement, il ne vieillit pas."
      },
      {
        name: "Sentir la Bête",
        desc: "Le Descendant discerne la Bête qui se niche dans le cœur des mortels, des vampires et des autres créatures surnaturelles. Il apprécie leur nature, mesurant l'intensité de leur faim et de leur hostilité.",
        cout: "Gratuit",
        systeme: "Jet de Résolution + Animalisme contre Sang-froid + Subterfuge. En cas de victoire, l'utilisateur sent le degré d'agressivité de la cible et discerne sa Bête surnaturelle si elle en possède une (vampire, loup-garou). Une victoire critique révèle le type précis de créature ainsi que son niveau de Soif ou de Rage.",
        duree: "Passif"
      }
    ]
  },
  "Auspex": {
    surnoms: "voyeurisme, divination, augure, Anima visus",
    resonance: "Flegmatique",
    type: "Mentale",
    powers: [
      {
        name: "Sens accrus",
        desc: "Les sens du vampire acquièrent une acuité hors du commun. Il est capable de voir dans l'obscurité totale, d'entendre les fréquences des ultrasons et de sentir la peur que dégage une proie acculée.",
        cout: "Gratuit",
        systeme: "L'utilisateur ajoute autant de dés à ses groupements de perception que son niveau d'Auspex. Lorsqu'il est exposé à des sensations extrêmes (détonations, flashs, odeurs capiteuses), il doit réussir un jet d'Astuce + Résolution (difficulté 3+) sous peine de subir une surcharge sensorielle (–3 dés à tous les groupements de perception jusqu'à la fin de la scène).",
        duree: "Jusqu'à ce que le personnage désactive le pouvoir."
      },
      {
        name: "Sentir l'invisible",
        desc: "Les sens du vampire s'alignent sur les dimensions au-delà du réel, ce qui lui permet de déceler des éléments autrement invisibles à l'œil nu : un vampire dissimulé par l'Occultation, un autre espionnant grâce à l'Auspex, un fantôme dans une salle, ou même les sorts latents de Sorcellerie du sang.",
        cout: "Gratuit",
        systeme: "Dès que le personnage tombe nez à nez avec un élément surnaturel imperceptible, le conteur effectue un jet caché d'Astuce + Auspex. Lorsqu'une entité tente de rester dissimulée, jet en opposition contre son groupement (par ex. Astuce + Occultation). En recherche active, jet de Résolution + Auspex.",
        duree: "Passif"
      }
    ]
  },
  "Célérité": {
    surnoms: "mettre la gomme, échappée belle, Velocitas",
    resonance: "Bilieuse",
    type: "Physique",
    powers: [
      {
        name: "Grâce féline",
        desc: "L'adresse et l'élégance du vampire surpassent celles des trapézistes de renommée internationale. Il est capable de marcher voire de courir sur des corniches et des câbles, conservant son équilibre sur les supports les plus étroits qui soient.",
        cout: "Gratuit",
        systeme: "Le personnage réussit automatiquement les jets basés sur la Dextérité ou l'Athlétisme pour conserver son équilibre. Ce pouvoir ne permet pas de se tenir sur des supports trop fragiles pour son poids.",
        duree: "Passif"
      },
      {
        name: "Réflexes éclair",
        desc: "Bien que leur corps ne puisse pas défier les lois de la nature, les vampires dotés de ce pouvoir perçoivent les événements instantanément et réagissent avec une vivacité surhumaine. La trajectoire des projectiles leur apparaît avec une telle clarté qu'ils peuvent esquiver les flèches et les balles sans couvert disponible.",
        cout: "Gratuit",
        systeme: "Le personnage ne souffre pas du malus d'absence de couvert sur les groupements de défense contre les attaques à l'arme à feu. Il peut aussi réaliser gratuitement et à chaque tour une action mineure d'une valeur de deux dés au plus (par ex. préparer ou recharger son arme).",
        duree: "Passif"
      }
    ]
  },
  "Domination": {
    surnoms: "charmer les serpents, hypnose, Mentis imperium",
    resonance: "Flegmatique",
    type: "Mentale",
    powers: [
      {
        name: "Brouillage mémoriel",
        desc: "En prononçant l'ordre « Oublie ! », le vampire intime à sa victime d'oublier le moment présent et les quelques minutes qui l'ont précédé, ce qui suffit à couvrir le temps d'une rencontre fortuite ou d'un repas superficiel. La cible ne crée pas de nouveaux souvenirs en compensation et, si on insiste, elle se rend compte de son trou de mémoire.",
        cout: "Gratuit",
        systeme: "Aucun jet contre un mortel pris au dépourvu. Pour brouiller la mémoire d'un vampire ou d'une cible résistante : jet en opposition de Charisme + Domination contre Astuce + Résolution.",
        duree: "Permanent"
      },
      {
        name: "Contrainte",
        desc: "Après avoir établi un contact visuel avec sa victime, le vampire lui donne un ordre qui tient dans une phrase, doit être réalisable en un tour et que sa cible suivra à la lettre. Le conteur est libre d'interpréter les consignes ambiguës pour qu'elles prennent un tour inattendu ou défavorable.",

        duree: "Maximum une scène"
      }
    ]
  },
  "Force d'âme": {
    surnoms: "fortification, peau de pierre, Resistentia",
    resonance: "Atrabilaire",
    type: "Physique",
    powers: [
      {
        name: "Résilience",
        desc: "Doté d'une endurance surnaturelle, le vampire transmet sa volonté d'acier à son corps.",
        cout: "Gratuit",
        systeme: "La jauge de santé du personnage est augmentée d'un montant égal à son niveau de Force d'âme.",
        duree: "Passif"
      },
      {
        name: "Un esprit résolu",
        desc: "Le vampire acquiert une capacité mystique lui permettant de résister à toute influence, que ce soit par le biais de charmes naturels, de coercition ou de la ruse. Selon les individus, ce pouvoir se manifeste sous la forme d'une parfaite sérénité ou d'un entêtement hors du commun.",
        cout: "Gratuit",
        systeme: "Le personnage reçoit autant de dés supplémentaires que son niveau de Force d'âme sur les jets pour résister à la coercition, à l'intimidation, à la séduction ou à tout autre stratagème destiné à l'influencer contre sa volonté. Fonctionne également contre les capacités surnaturelles telles que Domination et Présence.",
        duree: "Passif"
      }
    ]
  },
  "Occultation": {
    surnoms: "mode furtif, sous couverture, voile, Occulto",
    resonance: "Atrabilaire",
    type: "Mentale",
    powers: [
      {
        name: "Manteau d'ombre",
        desc: "Le vampire se tient parfaitement immobile pour se fondre dans son environnement. Tant qu'il dispose d'une cachette, sans bouger et sans émettre le moindre bruit, seuls les outils technologiques et les pouvoirs surnaturels sont capables de déceler sa présence.",
        cout: "Gratuit",
        systeme: "Le pouvoir suit les règles générales d'Occultation. L'effet prend fin quand le personnage bouge ou qu'il se fait repérer par un quelconque moyen.",
        duree: "Une scène"
      },
      {
        name: "Silence de la mort",
        desc: "Ce pouvoir populaire chez les Banu Haqim réduit au silence tous les sons que produit le vampire. Il ne fonctionne que sur l'ouïe, mais s'avère beaucoup plus efficace : le damné doit faire un vacarme d'enfer pour briser ce silence surnaturel.",
        cout: "Gratuit",
        systeme: "Le personnage fait taire les bruits de ses pas, de ses vêtements, de collisions mineures et tout autres sons qu'il produit avec son corps. Il reste indétectable à l'ouïe. Ce pouvoir n'élimine pas les sons produits autour du vampire (objets qu'il lance, portes qui claquent).",
        duree: "Une scène"
      }
    ]
  },
  "Présence": {
    surnoms: "vedettariat, subjugation, Sublimitas",
    resonance: "Sanguine",
    type: "Mentale",
    powers: [
      {
        name: "Intimider",
        desc: "Au lieu de séduire les gens, le vampire use de la Présence pour les repousser. Avec ce pouvoir, il émane de lui une aura de menace si terrible que les mortels évitent à tout prix d'attirer son attention. Même les autres Descendants réfléchissent à deux fois avant de tenter quoi que ce soit contre lui.",
        cout: "Gratuit",
        systeme: "Le niveau de Présence du personnage est ajouté à tous ses jets d'Intimidation. Il faut réussir un jet de Résolution + Sang-froid (difficulté 2) pour pouvoir l'attaquer. Ne peut pas être utilisé en même temps que Révérence.",
        duree: "Une scène ou jusqu'à ce que le personnage y mette fin."
      },
      {
        name: "Révérence",
        desc: "Quiconque se trouve en présence du vampire éprouve soudain une admiration inexplicable pour lui. Les gens boivent ses paroles et acquiescent à tout va, alors même que leurs points de vue diffèrent sur certains sujets.",
        cout: "Gratuit",
        systeme: "Le niveau de Présence du personnage est ajouté à ses jets impliquant Persuasion et Représentation. Les cibles conscientes de l'influence peuvent résister par un jet de Sang-froid + Intelligence contre Manipulation + Présence. Ne peut pas être utilisé en même temps qu'Intimider.",
        duree: "Une scène ou jusqu'à ce que le personnage y mette fin."

// =====================================================
// GÉNÉRATION PROCÉDURALE DE TACHES DE SANG (SVG)
// =====================================================

// Génère un chemin SVG en forme de blob irrégulier
function generateBlobPath(cx, cy, avgRadius, irregularity, spikiness, numPoints) {
  const points = [];
  const angleStep = (Math.PI * 2) / numPoints;
  let angle = Math.random() * Math.PI * 2;

  for (let i = 0; i < numPoints; i++) {
    const angleVar = (Math.random() - 0.5) * irregularity * angleStep;
    const currentAngle = angle + angleVar;
    const radiusMultiplier = 1 + (Math.random() - 0.3) * spikiness;
    const r = avgRadius * radiusMultiplier;
    points.push({
      x: cx + Math.cos(currentAngle) * r,
      y: cy + Math.sin(currentAngle) * r
    });
    angle += angleStep;
  }

  let path = `M ${points[0].x.toFixed(1)} ${points[0].y.toFixed(1)}`;
  for (let i = 0; i < points.length; i++) {
    const p1 = points[i];
    const p2 = points[(i + 1) % points.length];
    const p0 = points[(i - 1 + points.length) % points.length];
    const p3 = points[(i + 2) % points.length];
    const smooth = 0.35;
    const c1x = p1.x + (p2.x - p0.x) * smooth;
    const c1y = p1.y + (p2.y - p0.y) * smooth;
    const c2x = p2.x - (p3.x - p1.x) * smooth;
    const c2y = p2.y - (p3.y - p1.y) * smooth;
    path += ` C ${c1x.toFixed(1)} ${c1y.toFixed(1)}, ${c2x.toFixed(1)} ${c2y.toFixed(1)}, ${p2.x.toFixed(1)} ${p2.y.toFixed(1)}`;
  }
  path += ' Z';
  return path;
}

// Génère un chemin de traînée / coulure
function generateStreakPath(cx, cy, angle, length, width) {
  const dx = Math.cos(angle);
  const dy = Math.sin(angle);
  const px = -dy;
  const py = dx;
  const x1 = cx + px * width * 0.5;
  const y1 = cy + py * width * 0.5;
  const x2 = cx - px * width * 0.5;
  const y2 = cy - py * width * 0.5;
  const tipX = cx + dx * length;
  const tipY = cy + dy * length;
  return `M ${x1.toFixed(1)} ${y1.toFixed(1)}
          Q ${(cx + dx * length * 0.3).toFixed(1)} ${(cy + py * width * 0.3).toFixed(1)},
            ${tipX.toFixed(1)} ${tipY.toFixed(1)}
          Q ${(cx + dx * length * 0.3).toFixed(1)} ${(cy - py * width * 0.3).toFixed(1)},
            ${x2.toFixed(1)} ${y2.toFixed(1)} Z`;
}

// Construit le SVG complet d'une éclaboussure
function buildSplatSVG(size) {
  const viewBox = 400;
  const cx = viewBox / 2;
  const cy = viewBox / 2;

  const reds = ['#8b0000', '#7a0000', '#6b0000', '#5a0000', '#a01818', '#4a0000'];
  const mainColor = reds[Math.floor(Math.random() * 3)];
  const uid = splatterCount + '_' + Math.floor(Math.random() * 10000);

  let svg = `<svg viewBox="0 0 ${viewBox} ${viewBox}" width="${size}" height="${size}" xmlns="http://www.w3.org/2000/svg">`;

  svg += `<defs>
    <radialGradient id="bloodGrad_${uid}" cx="45%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#a01818" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="${mainColor}" stop-opacity="1"/>
      <stop offset="100%" stop-color="#3a0000" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="bloodBlur_${uid}" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>`;

  svg += `<g filter="url(#bloodBlur_${uid})">`;

  // Blob principal irrégulier
  const mainRadius = 90 + Math.random() * 30;
  const mainPath = generateBlobPath(
    cx, cy,
    mainRadius,
    0.5,
    0.6,
    14 + Math.floor(Math.random() * 5)
  );
  svg += `<path d="${mainPath}" fill="url(#bloodGrad_${uid})"/>`;

  // Sous-blob asymétrique
  const subAngle = Math.random() * Math.PI * 2;
  const subDist = mainRadius * 0.7;
  const subX = cx + Math.cos(subAngle) * subDist;
  const subY = cy + Math.sin(subAngle) * subDist;
  const subRadius = mainRadius * (0.35 + Math.random() * 0.25);
  const subPath = generateBlobPath(subX, subY, subRadius, 0.6, 0.7, 10);
  svg += `<path d="${subPath}" fill="${mainColor}" opacity="0.95"/>`;

  // Traînées / coulures
  const streakCount = 3 + Math.floor(Math.random() * 4);
  for (let i = 0; i < streakCount; i++) {
    const sAngle = Math.random() * Math.PI * 2;
    const sLength = mainRadius * (0.8 + Math.random() * 1.4);
    const sWidth = 8 + Math.random() * 18;
    const sStartX = cx + Math.cos(sAngle) * mainRadius * 0.85;
    const sStartY = cy + Math.sin(sAngle) * mainRadius * 0.85;
    const streakPath = generateStreakPath(sStartX, sStartY, sAngle, sLength, sWidth);
    const streakColor = reds[Math.floor(Math.random() * reds.length)];
    svg += `<path d="${streakPath}" fill="${streakColor}" opacity="${(0.7 + Math.random() * 0.3).toFixed(2)}"/>`;
  }

  svg += `</g>`;

  // Satellites (droplets)
  const dropletCount = 8 + Math.floor(Math.random() * 14);
  for (let i = 0; i < dropletCount; i++) {
    const dAngle = Math.random() * Math.PI * 2;
    const dDist = mainRadius * (1.1 + Math.random() * 1.6);
    const dx = cx + Math.cos(dAngle) * dDist;
    const dy = cy + Math.sin(dAngle) * dDist;
    const dSize = 3 + Math.random() * 22;
    const dColor = reds[Math.floor(Math.random() * reds.length)];
    if (Math.random() > 0.6) {
      const dPath = generateBlobPath(dx, dy, dSize, 0.4, 0.5, 8);
      svg += `<path class="droplet" d="${dPath}" fill="${dColor}" opacity="${(0.75 + Math.random() * 0.25).toFixed(2)}" style="animation-delay:${(0.1 + Math.random() * 0.5).toFixed(2)}s;transform-origin:${dx.toFixed(1)}px ${dy.toFixed(1)}px"/>`;
    } else {
      svg += `<circle class="droplet" cx="${dx.toFixed(1)}" cy="${dy.toFixed(1)}" r="${dSize.toFixed(1)}" fill="${dColor}" opacity="${(0.75 + Math.random() * 0.25).toFixed(2)}" style="animation-delay:${(0.1 + Math.random() * 0.5).toFixed(2)}s;transform-origin:${dx.toFixed(1)}px ${dy.toFixed(1)}px"/>`;
    }
  }

  // Micro-projections
  const microCount = 6 + Math.floor(Math.random() * 10);
  for (let i = 0; i < microCount; i++) {
    const mAngle = Math.random() * Math.PI * 2;
    const mDist = mainRadius * (2.2 + Math.random() * 1.5);
    const mx = cx + Math.cos(mAngle) * mDist;
    const my = cy + Math.sin(mAngle) * mDist;
    const mSize = 1 + Math.random() * 4;
    svg += `<circle class="droplet" cx="${mx.toFixed(1)}" cy="${my.toFixed(1)}" r="${mSize.toFixed(1)}" fill="${reds[Math.floor(Math.random() * reds.length)]}" opacity="${(0.6 + Math.random() * 0.3).toFixed(2)}" style="animation-delay:${(0.3 + Math.random() * 0.6).toFixed(2)}s;transform-origin:${mx.toFixed(1)}px ${my.toFixed(1)}px"/>`;
  }

  svg += `</svg>`;
  return svg;
}

function spawnSplat() {
  const splat = document.createElement('div');
  splat.className = 'blood-splat';

  const x = Math.random() * 100;
  const y = Math.random() * 100;

  const progress = Math.min(1, splatterCount / 12);
  const baseSize = 140 + progress * 480;
  const size = baseSize + Math.random() * 220;

  splat.style.left = x + 'vw';
  splat.style.top = y + 'vh';
  splat.style.setProperty('--rot', (Math.random() * 360) + 'deg');

  splat.innerHTML = buildSplatSVG(size);

  bloodOverlay.appendChild(splat);
  splatterCount++;
}

// =====================================================
// PULSE / RITUAL
// =====================================================
const pulseZone = document.getElementById('pulse-zone');
const pulseInner = document.getElementById('pulse-inner');
const progressText = document.getElementById('progress-text');
const bloodOverlay = document.getElementById('blood-overlay');
const bloodFlood = document.getElementById('blood-flood');
const transitionVeil = document.getElementById('transition-veil');

function startHold(e) {
  e.preventDefault();
  if (holdTimer) return;
  pulseZone.classList.add('active');
  pulseInner.innerHTML = 'Ne bougez<br>plus...';
  holdStart = Date.now();
  splatterCount = 0;

  bloodOverlay.innerHTML = '';
  bloodOverlay.classList.add('active');

  spawnSplat();
  scheduleNextSplat(400);

  updateProgress();
  holdTimer = setInterval(updateProgress, 100);
}

function scheduleNextSplat(delay) {
  splatterInterval = setTimeout(() => {
    if (!holdTimer) return;
    spawnSplat();
    const elapsed = (Date.now() - holdStart) / 1000;
    const nextDelay = Math.max(150, 500 - elapsed * 80);
    scheduleNextSplat(nextDelay);
  }, delay);
}

function updateProgress() {
  const elapsed = (Date.now() - holdStart) / 1000;
  const remaining = Math.max(0, 5 - elapsed);
  if (remaining > 0) {
    progressText.textContent = remaining.toFixed(1) + ' s';
  } else {
    clearInterval(holdTimer);
    holdTimer = null;
    clearTimeout(splatterInterval);
    progressText.textContent = '';
    triggerFlood();
  }
}

function triggerFlood() {
  for (let i = 0; i < 6; i++) {
    setTimeout(spawnSplat, i * 80);
  }
  setTimeout(() => {
    bloodFlood.classList.add('active');
  }, 600);
  setTimeout(() => {
    transitionVeil.classList.add('active');
  }, 1600);
  setTimeout(() => {
    revealPower();
    bloodOverlay.classList.remove('active');
    bloodOverlay.innerHTML = '';
    bloodFlood.classList.remove('active');
    setTimeout(() => transitionVeil.classList.remove('active'), 50);
  }, 2400);
}

function cancelHold(e) {
  if (holdTimer) {
    clearInterval(holdTimer);
    holdTimer = null;
    clearTimeout(splatterInterval);
    progressText.textContent = 'Le rituel est interrompu...';
    bloodOverlay.classList.remove('active');
    setTimeout(() => {
      bloodOverlay.innerHTML = '';
      resetPulse();
    }, 800);
  }
}

function resetPulse() {
  pulseZone.classList.remove('active');
  pulseInner.innerHTML = 'Posez votre<br>doigt ici';
  progressText.textContent = '';
  if (holdTimer) { clearInterval(holdTimer); holdTimer = null; }
  if (splatterInterval) { clearTimeout(splatterInterval); splatterInterval = null; }
  bloodOverlay.classList.remove('active');
  bloodOverlay.innerHTML = '';
  bloodFlood.classList.remove('active');
  transitionVeil.classList.remove('active');
}

pulseZone.addEventListener('touchstart', startHold, { passive: false });
pulseZone.addEventListener('touchend', cancelHold);
pulseZone.addEventListener('touchcancel', cancelHold);
pulseZone.addEventListener('mousedown', startHold);
pulseZone.addEventListener('mouseup', cancelHold);
pulseZone.addEventListener('mouseleave', cancelHold);

// =====================================================
// REVEAL POWER
// =====================================================
function getAvailablePowers() {
  const pool = [];
  CLANS[selectedClan].disciplines.forEach(disc => {
    DISCIPLINES[disc].powers.forEach(pw => {
      const key = disc + '::' + pw.name;
      if (!excludedPowers.has(key)) {
        pool.push({ discipline: disc, power: pw, key: key });
      }
    });
  });
  return pool;
}

function revealPower() {
  const available = getAvailablePowers();
  if (available.length === 0) {
    showScreen('screen-result');
    document.getElementById('clan-badge-result').textContent = selectedClan + ' — ' + CLANS[selectedClan].tagline;
    document.getElementById('power-card').style.display = 'none';
    document.getElementById('reroll-btn').style.display = 'none';
    document.getElementById('exhausted-container').innerHTML =
      '<div class="exhausted-msg">Vous connaissez déjà tous les pouvoirs de niveau 1 accessibles à votre clan. Votre Sang est riche en expérience.</div>';
    return;
  }
  document.getElementById('exhausted-container').innerHTML = '';
  document.getElementById('power-card').style.display = 'block';
  document.getElementById('reroll-btn').style.display = 'block';

  const pick = available[Math.floor(Math.random() * available.length)];
  currentPower = pick;
  displayPower(pick);
  showScreen('screen-result');
}

function displayPower({ discipline, power }) {
  document.getElementById('clan-badge-result').textContent = selectedClan + ' — ' + CLANS[selectedClan].tagline;
  const disc = DISCIPLINES[discipline];
  const html = `
    <div class="discipline-label">${discipline}</div>
    <div class="power-name">${power.name}</div>
    <div class="power-level">Pouvoir de niveau 1</div>
    <div class="separator"></div>
    <div class="power-desc">${power.desc}</div>
    <div class="separator"></div>
    <div class="power-detail"><strong>COÛT :</strong> ${power.cout}</div>
    <div class="power-detail"><strong>SYSTÈME :</strong> ${power.systeme}</div>
    <div class="power-detail"><strong>DURÉE :</strong> ${power.duree}</div>
    <div class="separator"></div>
    <div class="power-detail" style="font-style:italic;color:#8a7358;font-size:0.82rem;">
      Discipline ${disc.type.toLowerCase()} — Résonance : ${disc.resonance}
    </div>
  `;
  document.getElementById('power-card').innerHTML = html;
}

function rerollPower() {
  if (currentPower) {
    excludedPowers.add(currentPower.key);
  }
  restartRitual();
}

function restartRitual() {
  currentPower = null;
  showScreen('screen-ritual');
  resetPulse();
}

initClanGrid();
